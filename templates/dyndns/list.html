{{$zoneID := .Data.ZoneID}}
{{$csrf := .CSRFToken}}

{{if .Data.Token}}
<div class="flash flash-warning" style="word-break:break-all">{{.Data.Token}}</div>
{{end}}

{{if .Data.Labels}}
<table class="table">
    <thead>
        <tr>
            <th>Label</th>
            <th>Hostname</th>
            <th class="actions-col">Actions</th>
        </tr>
    </thead>
    <tbody>
        {{range .Data.Labels}}
        <tr>
            <td>{{.Label}}</td>
            <td class="mono">{{.Hostname}}</td>
            <td class="actions-col">
                <div class="btn-group">
                    <form class="inline-form" method="POST" action="/admin/zones/{{$zoneID}}/dyndns/{{.Label}}/delete">
                        <input type="hidden" name="csrf_token" value="{{$csrf}}">
                        <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Disable DynDNS for {{.Label}}?')">Disable</button>
                    </form>
                </div>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<p class="text-muted">No DynDNS labels configured for this zone.</p>
{{end}}

<form hx-post="/admin/zones/{{$zoneID}}/dyndns" hx-target="#dyndns-section" hx-swap="innerHTML">
    <div class="form-row">
        <div class="form-group">
            <label for="dyndns-label">Label</label>
            <input type="text" id="dyndns-label" name="label" placeholder="e.g. home" required class="form-control">
        </div>
        <div class="form-group form-group-btn">
            <button type="submit" class="btn btn-primary">Enable DynDNS</button>
        </div>
    </div>
</form>
