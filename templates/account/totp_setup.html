{{define "content"}}
<div class="container-narrow">
    <div class="page-header">
        <h1>Set Up Two-Factor Authentication</h1>
    </div>

    <div class="card">
        <div class="card-body">
            <p>Scan the QR code with your authenticator app (Google Authenticator, Authy, etc.):</p>

            <div class="totp-qr">
                <img src="data:image/png;base64,{{.Data.QRCode}}" alt="TOTP QR Code" width="200" height="200">
            </div>

            <p>Or enter this secret manually:</p>
            <code class="totp-secret">{{.Data.Secret}}</code>

            {{if .Data.Error}}<div class="error">{{.Data.Error}}</div>{{end}}

            <form method="POST" action="/account/totp/enable">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <div class="form-group">
                    <label for="totp_code">Enter the 6-digit code from your app to verify</label>
                    <input type="text" id="totp_code" name="code" class="form-control" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required autofocus>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Verify and Enable</button>
                    <a href="/account" class="btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}
